services:
  backend:
    container_name: backend
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + process.env.BACK_PORT + '/health', res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres_db:
        condition: service_healthy
    env_file: .env
    # In development only opened (to test out API calls to backend)
    ports:
      - "${BACK_PORT}:${BACK_PORT}"
    networks:
      - gp_internal
    restart: always
  postgres_db:
    container_name: postgres_db
    image: postgres:16.4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 10
    env_file: .env
    environment:
      - POSTGRES_DB=${DB_NAME:-goodplays_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes: # need to get back to this later to see if this is the best option
      - postgres:/var/lib/postgresql/data
    networks:
      - gp_internal
    restart: always
  frontend:
    container_name: frontend
    build: ./frontend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + 5173, res => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - gp_internal
    restart: always

volumes:
  postgres:

networks:
  gp_internal:
    name: gp_internal
    # In development only commented out! (to test out API calls to backend)
    # internal: true
    driver: bridge
